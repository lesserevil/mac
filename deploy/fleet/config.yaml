# Sample mac fleet configuration.
#
# This file is a checked-in schema/defaults sample only. Real fleet topology
# lives outside Git in ~/.mac/fleets.yaml, keyed by hub node name. Do not put
# bearer tokens or provider keys in YAML; use ~/.mac/.env and host-local secret
# stores for secrets.

sample: true
fleet_name: example

hub_agent: hub
hub_url: http://hub.example.internal:8789
shared_services_manager_agent: hub

defaults:
  supervisor: auto
  hermes:
    slack_home_channel_name: ""
    gateway_provider: custom
    gateway_base_url: ""
  worker:
    mode: heartbeat
    capabilities:
      - ops
      - python
      - hermes
      - review
    allowed_projects: ""
    required_metadata: ""
    require_canary: true
  qdrant:
    install: auto
    required: true
    url: ""
    bind_addr: ""
    port: 6333
    image: docker.io/qdrant/qdrant:latest
    memory_limit: 2g
  tailscale:
    install: auto
    # headscale: auto (default) — use self-hosted headscale on the hub; no external account needed.
    # Set to "no" to use Tailscale cloud instead (requires MAC_DEPLOY_TAILSCALE_AUTH_KEY in env).
    headscale: auto
    headscale_port: 8080
    # headscale_public_addr: hub's externally routable address for the headscale API.
    # Workers must be able to reach hub:headscale_port for initial mesh registration.
    # Defaults to the hub's SSH target hostname if blank.
    headscale_public_addr: ""
    # hostname_prefix: optional string prepended to each agent name as the Tailscale hostname.
    hostname_prefix: ""

agents:
  - name: hub
    enabled: true
    target: user@hub.example.internal
    os: linux
    control_bind_host: 0.0.0.0
    hermes:
      gateway_model: provider/family/hub-model
    worker:
      mode: loop
      require_canary: false

  - name: worker-linux
    enabled: false
    target: user@worker-linux.example.internal
    os: linux
    hermes:
      gateway_model: provider/family/linux-worker-model

  - name: worker-macos
    enabled: false
    target: user@worker-macos.example.internal
    os: darwin
    hermes:
      gateway_model: provider/family/macos-worker-model
